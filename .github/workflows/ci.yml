name: ConnectHub CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run the full test suite against a real PostgreSQL instance
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, zip, opcache
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env from example
        run: cp .env.example .env

      - name: Set environment variables for testing
        run: |
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=testing/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=sail/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        run: php artisan test

  # ---------------------------------------------------------------------------
  # Job 2: Build and verify the production Docker image
  # Only runs on pushes to main, and only after tests pass
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image
        run: docker build -t hatchloom-connecthub:${{ github.sha }} -t hatchloom-connecthub:latest .

      - name: Verify image can run artisan
        run: |
          docker run --rm \
            -e APP_KEY="base64:$(openssl rand -base64 32)" \
            -e APP_ENV=production \
            -e DB_CONNECTION=pgsql \
            -e DB_HOST=localhost \
            -e DB_DATABASE=test \
            -e DB_USERNAME=test \
            -e DB_PASSWORD=test \
            --entrypoint php \
            hatchloom-connecthub:latest \
            artisan --version
